<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinSmart Advisor Pro | Master Financial Plan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 18px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .dark-mode {
            --bg-main: #020617;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; transition: background 0.3s; overflow-x: hidden; }

        /* Responsive Layout Shell */
        .app-shell { display: flex; flex-direction: row; min-height: 100vh; }
        
        .sidebar {
            width: 380px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .main-content { flex: 1; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* Mobile specific adjustments */
        @media (max-width: 1024px) {
            .app-shell { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                position: relative; 
                border-right: none; 
                border-bottom: 1px solid var(--border);
                display: none; /* Hidden by default on mobile, toggled via JS */
            }
            .sidebar.active { display: flex; }
            .mobile-header { display: flex !important; }
        }

        .mobile-header {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 110;
        }

        .sidebar-scrollbox { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .sidebar-footer { padding: 16px 20px; background: var(--bg-card); border-top: 1px solid var(--border); }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 20px 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-box { margin-bottom: 12px; }
        .input-box label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .input-wrapper { position: relative; }
        .input-wrapper span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-weight: 600; font-size: 0.8rem; }
        
        input {
            width: 100%;
            padding: 12px 12px 12px 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem; /* Better for mobile zoom prevention */
            outline: none;
        }

        .loan-card {
            background: var(--bg-main);
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .loan-card .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        
        .loan-title-input {
            background: transparent; 
            border: 1px solid transparent; 
            padding: 4px 0; 
            font-weight: 800; 
            color: var(--text-main); 
            font-size: 0.9rem; 
            width: 70%;
        }

        .tenure-info {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .metric-card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .metric-card .label { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .metric-card .value { font-size: 1.25rem; font-weight: 800; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; }

        .viz-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }

        .chart-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            height: 320px;
            display: flex;
            flex-direction: column;
        }

        .btn {
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            padding: 12px 16px;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); }
        .btn-icon { padding: 10px; }

        .strategy-box {
            margin-top: 24px;
            padding: 20px;
            border-radius: var(--radius-lg);
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        @media (min-width: 768px) { .strategy-box { flex-direction: row; } .strategy-box > div { flex: 1; } }
        .dark-mode .strategy-box { background: #0f172a; border-color: #1e293b; }

        .save-status {
            display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--text-muted);
            margin-top: 8px; padding: 6px 10px; background: var(--bg-main); border-radius: 6px; width: fit-content;
        }

        .highlight-green { color: var(--success); font-weight: 700; }
        .highlight-red { color: var(--danger); font-weight: 700; }
    </style>
</head>
<body>

<!-- Mobile Navbar -->
<div class="mobile-header">
    <div style="display: flex; align-items: center; gap: 8px;">
        <div style="background: var(--primary); padding: 6px; border-radius: 8px; color: white;">
            <i data-lucide="trending-up" style="width:18px;height:18px;"></i>
        </div>
        <h1 style="font-size: 1rem; font-weight: 800;">FinSmart<span style="color: var(--primary);">Pro</span></h1>
    </div>
    <div style="display: flex; gap: 8px;">
        <button class="btn btn-secondary btn-icon" onclick="toggleTheme()"><i data-lucide="moon" id="theme-icon-mobile" style="width:18px"></i></button>
        <button class="btn btn-primary btn-icon" onclick="toggleSidebar()"><i data-lucide="settings-2" style="width:18px"></i></button>
    </div>
</div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-scrollbox">
            <div class="desktop-only" style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
                <div style="background: var(--primary); padding: 8px; border-radius: 10px; color: white;">
                    <i data-lucide="trending-up"></i>
                </div>
                <h1 style="font-size: 1.1rem; font-weight: 800;">FinSmart<span style="color: var(--primary);">Pro</span></h1>
            </div>

            <div class="save-status" id="storage-indicator">
                <i data-lucide="database" style="width:14px; color:var(--text-muted)"></i>
                <span>Cloud Sync Enabled</span>
            </div>

            <div class="section-label">Income Setup</div>
            <div class="input-box">
                <label>Annual Gross (CTC)</label>
                <div class="input-wrapper"><span>₹</span><input type="number" id="annual-gross" value="1800000" oninput="calculateAndSave()"></div>
            </div>
            <div class="input-box">
                <label>Monthly Bonus/Side</label>
                <div class="input-wrapper"><span>₹</span><input type="number" id="monthly-side" value="5000" oninput="calculateAndSave()"></div>
            </div>

            <div class="section-label">Expenses & Cash</div>
            <div class="input-box">
                <label>Monthly Essentials</label>
                <div class="input-wrapper"><span>₹</span><input type="number" id="monthly-exp" value="45000" oninput="calculateAndSave()"></div>
            </div>
            <div class="input-box">
                <label>Total Liquid Cash</label>
                <div class="input-wrapper"><span>₹</span><input type="number" id="current-cash" value="300000" oninput="calculateAndSave()"></div>
            </div>

            <div class="section-label">
                <span>Debt Tracker</span>
                <button class="btn btn-primary" style="padding:4px 8px; font-size:0.7rem; border-radius:6px;" onclick="addLoan()">+ ADD</button>
            </div>
            <div id="loan-list"></div>
        </div>

        <div class="sidebar-footer">
            <button class="btn btn-secondary" style="width:100%; color:var(--danger); border-color:#fee2e2" onclick="clearData()">
                <i data-lucide="trash-2" style="width:16px"></i> Reset Data
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-row" style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h2 style="font-size: 1.25rem; font-weight: 800;">Financial Summary</h2>
                <p style="color: var(--text-muted); font-size: 0.8rem;">Last updated: <span id="current-date"></span></p>
            </div>
            <button class="btn btn-primary desktop-only" onclick="window.print()" style="padding: 8px 16px;">
                <i data-lucide="download" style="width:16px"></i> Export
            </button>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="label">Disposable</div>
                <div class="value" id="val-surplus" style="color: var(--primary);">₹0</div>
            </div>
            <div class="metric-card">
                <div class="label">Runway</div>
                <div class="value" id="val-runway">0m</div>
            </div>
            <div class="metric-card">
                <div class="label">Debt Free</div>
                <div class="value" id="val-debt-date" style="color: var(--success);">Done</div>
            </div>
        </div>

        <div class="viz-grid">
            <div class="chart-card">
                <h3 style="font-size: 0.9rem; margin-bottom: 12px;"><i data-lucide="pie-chart" style="width:16px"></i> Budget Flow</h3>
                <div style="flex:1; position:relative;"><canvas id="budgetChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3 style="font-size: 0.9rem; margin-bottom: 12px;"><i data-lucide="activity" style="width:16px"></i> Rate Heatmap</h3>
                <div style="flex:1; position:relative;"><canvas id="rateChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3 style="font-size: 0.9rem; margin-bottom: 12px;"><i data-lucide="shield-alert" style="width:16px"></i> Survival Burn</h3>
                <div style="flex:1; position:relative;"><canvas id="burnChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3 style="font-size: 0.9rem; margin-bottom: 12px;"><i data-lucide="line-chart" style="width:16px"></i> Net Worth Projection</h3>
                <div style="flex:1; position:relative;"><canvas id="wealthChart"></canvas></div>
            </div>
        </div>

        <div class="strategy-box">
            <div>
                <h4 style="display:flex; align-items:center; gap:8px; font-weight:800; color:var(--primary); font-size:0.9rem;"><i data-lucide="zap" style="width:18px"></i> Strategy</h4>
                <div id="ai-conclusion" style="margin-top:10px; font-size:0.85rem; line-height:1.5;"></div>
            </div>
            <div>
                <h4 style="display:flex; align-items:center; gap:8px; font-weight:800; color:var(--success); font-size:0.9rem;"><i data-lucide="check-circle" style="width:18px"></i> Actions</h4>
                <div id="ai-steps" style="margin-top:10px; font-size:0.85rem; line-height:1.5;"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const STORAGE_KEY = 'finsmart_pro_v2_data';
    let loans = [];
    let charts = {};

    function init() {
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
        loadFromStorage();
        renderLoans();
        calculate();
        lucide.createIcons();
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('active');
        if (sidebar.classList.contains('active')) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function calculateAndSave() {
        calculate();
        saveToStorage();
    }

    function saveToStorage() {
        const data = {
            annual: document.getElementById('annual-gross').value,
            bonus: document.getElementById('monthly-side').value,
            exp: document.getElementById('monthly-exp').value,
            cash: document.getElementById('current-cash').value,
            loans: loans,
            theme: document.body.classList.contains('dark-mode') ? 'dark' : 'light'
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        const indicator = document.getElementById('storage-indicator');
        indicator.innerHTML = `<i data-lucide="check" style="width:14px; color:var(--success)"></i><span>Synced</span>`;
        lucide.createIcons();
    }

    function loadFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('annual-gross').value = data.annual || 1800000;
            document.getElementById('monthly-side').value = data.bonus || 5000;
            document.getElementById('monthly-exp').value = data.exp || 45000;
            document.getElementById('current-cash').value = data.cash || 300000;
            loans = data.loans || [];
            if (data.theme === 'dark') document.body.classList.add('dark-mode');
        } else {
            loans = [
                { id: 1, name: 'Personal Loan', balance: 500000, rate: 11, emi: 12000, prepayment: 0 },
                { id: 2, name: 'Car Loan', balance: 200000, rate: 9, emi: 6500, prepayment: 0 }
            ];
        }
    }

    function addLoan() {
        loans.push({ id: Date.now(), name: 'New Debt', balance: 100000, rate: 10, emi: 2500, prepayment: 0 });
        renderLoans();
        calculateAndSave();
    }

    function deleteLoan(id) {
        loans = loans.filter(l => l.id !== id);
        renderLoans();
        calculateAndSave();
    }

    function updateLoan(id, field, value) {
        const loan = loans.find(l => l.id === id);
        if (loan) {
            loan[field] = field === 'name' ? value : parseFloat(value) || 0;
            calculateAndSave();
            updateTenureUI(loan);
        }
    }

    function renderLoans() {
        const list = document.getElementById('loan-list');
        list.innerHTML = '';
        loans.forEach(loan => {
            const card = document.createElement('div');
            card.className = 'loan-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <input type="text" class="loan-title-input" value="${loan.name}" oninput="updateLoan(${loan.id}, 'name', this.value)">
                    <button class="btn-delete" style="background:none; border:none; color:var(--danger)" onclick="deleteLoan(${loan.id})"><i data-lucide="x" style="width:16px"></i></button>
                </div>
                <div class="grid">
                    <div class="input-box">
                        <label>Balance</label>
                        <div class="input-wrapper"><span>₹</span><input type="number" value="${loan.balance}" oninput="updateLoan(${loan.id}, 'balance', this.value)"></div>
                    </div>
                    <div class="input-box">
                        <label>Interest %</label>
                        <div class="input-wrapper"><span>%</span><input type="number" step="0.1" value="${loan.rate}" oninput="updateLoan(${loan.id}, 'rate', this.value)"></div>
                    </div>
                    <div class="input-box">
                        <label>EMI</label>
                        <div class="input-wrapper"><span>₹</span><input type="number" value="${loan.emi}" oninput="updateLoan(${loan.id}, 'emi', this.value)"></div>
                    </div>
                    <div class="input-box">
                        <label>Extra</label>
                        <div class="input-wrapper"><span>+</span><input type="number" value="${loan.prepayment}" oninput="updateLoan(${loan.id}, 'prepayment', this.value)" style="border-color:var(--success)"></div>
                    </div>
                </div>
                <div class="tenure-info" id="tenure-info-${loan.id}"></div>
            `;
            list.appendChild(card);
            updateTenureUI(loan);
        });
        lucide.createIcons();
    }

    function calcMonths(P, annualRate, emi) {
        if (P <= 0) return 0;
        if (emi <= 0) return Infinity;
        const monthlyRate = (annualRate / 100) / 12;
        if (emi <= P * monthlyRate) return Infinity;
        const n = Math.log(emi / (emi - P * monthlyRate)) / Math.log(1 + monthlyRate);
        return Math.ceil(n);
    }

    function updateTenureUI(loan) {
        const infoEl = document.getElementById(`tenure-info-${loan.id}`);
        if (!infoEl) return;
        const std = calcMonths(loan.balance, loan.rate, loan.emi);
        const acc = calcMonths(loan.balance, loan.rate, loan.emi + loan.prepayment);
        if (std === Infinity) {
            infoEl.innerHTML = `<span class="highlight-red">⚠️ Trap! EMI < Interest</span>`;
        } else {
            const saved = std - acc;
            infoEl.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <span>Base: <b>${std}m</b></span>
                    <span class="${saved > 0 ? 'highlight-green' : ''}">New: <b>${acc}m</b></span>
                </div>
                ${saved > 0 ? `<div class="highlight-green" style="font-size:0.7rem; margin-top:2px;">⚡ Saved ${saved} months</div>` : ''}
            `;
        }
    }

    function calculate() {
        const annual = parseFloat(document.getElementById('annual-gross').value) || 0;
        const bonus = parseFloat(document.getElementById('monthly-side').value) || 0;
        const expense = parseFloat(document.getElementById('monthly-exp').value) || 0;
        const cash = parseFloat(document.getElementById('current-cash').value) || 0;

        let tax = 0;
        let taxable = Math.max(0, annual - 75000);
        if (taxable > 1500000) tax = (taxable - 1500000) * 0.3 + 150000;
        else if (taxable > 1200000) tax = (taxable - 1200000) * 0.2 + 90000;
        else if (taxable > 700000) tax = (taxable - 700000) * 0.1;

        const monthlyIncome = (annual - tax) / 12 + bonus;
        const totalEMI = loans.reduce((s, l) => s + l.emi, 0);
        const totalPrepay = loans.reduce((s, l) => s + l.prepayment, 0);
        const surplus = monthlyIncome - expense - totalEMI - totalPrepay;

        const monthlyBurn = expense + totalEMI + totalPrepay;
        const runway = monthlyBurn > 0 ? (cash / monthlyBurn).toFixed(1) : "∞";

        const tenures = loans.map(l => calcMonths(l.balance, l.rate, l.emi + l.prepayment));
        const maxTenure = tenures.length > 0 ? Math.max(...tenures) : 0;
        
        let debtDateStr = "Done!";
        if (maxTenure === Infinity) debtDateStr = "Debt Trap";
        else if (maxTenure > 0) {
            const y = Math.floor(maxTenure / 12);
            const m = maxTenure % 12;
            debtDateStr = `${y > 0 ? y + 'y ' : ''}${m}m`;
        }

        document.getElementById('val-surplus').innerText = formatINR(surplus);
        document.getElementById('val-runway').innerText = runway + "m";
        document.getElementById('val-debt-date').innerText = debtDateStr;

        updateCharts(monthlyIncome, expense, totalEMI, totalPrepay, surplus, cash);
        generateNarrative(surplus, runway, maxTenure, cash, expense);
    }

    function updateCharts(income, exp, emi, prepay, surplus, cash) {
        renderChart('budgetChart', 'doughnut', ['Living', 'EMI', 'Extra', 'Surplus'], [exp, emi, prepay, Math.max(0, surplus)], ['#94a3b8', '#6366f1', '#10b981', '#4ade80']);
        renderChart('rateChart', 'bar', loans.map(l => l.name), loans.map(l => l.rate), '#ef4444');
        renderChart('burnChart', 'bar', ['Burn', 'Cash'], [exp+emi+prepay, cash], ['#f59e0b', '#6366f1']);
        renderChart('wealthChart', 'line', ['Y0','Y1','Y2','Y3','Y4','Y5'], Array.from({length:6}, (_, i) => cash * Math.pow(1.12, i)), '#10b981');
    }

    function renderChart(id, type, labels, data, colors) {
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: type,
            data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: type === 'line' ? colors : 'transparent', borderRadius: 4, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: type === 'doughnut', position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    function generateNarrative(surplus, runway, tenure, cash, exp) {
        const concl = document.getElementById('ai-conclusion');
        const steps = document.getElementById('ai-steps');
        if (tenure === Infinity) {
            concl.innerHTML = `You are in a <b class="highlight-red">Debt Trap</b>. Principal is growing.`;
            steps.innerHTML = `• Increase EMI immediately.<br>• Stop all luxury spends.`;
        } else if (runway < 3) {
            concl.innerHTML = `Runway is <b class="highlight-red">Low (${runway}m)</b>. Build emergency fund.`;
            steps.innerHTML = `• Pause prepayments.<br>• Reach 6 months of backup.`;
        } else {
            concl.innerHTML = `Strategy is <b class="highlight-green">Stable</b>. Focus on growth.`;
            steps.innerHTML = `• Automate ₹${formatShort(surplus * 0.7)} SIP.<br>• Check health insurance.`;
        }
    }

    function formatINR(n) { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(n); }
    function formatShort(n) { return n >= 100000 ? (n/100000).toFixed(1) + "L" : (n/1000).toFixed(1) + "k"; }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); calculate(); }
    function clearData() { if(confirm("Clear all?")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }

    window.onload = init;
</script>
</body>
</html>
